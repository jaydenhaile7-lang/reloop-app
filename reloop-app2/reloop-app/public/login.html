<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Reloop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{background:#eaefef; color:#12181f; font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:20px;}
  .card{background:#fff; border:1.5px solid #c7cfcf; border-radius:10px; padding:44px; max-width:400px; width:100%;}
  h1{font-family:'Fraunces',serif; font-size:26px; margin-bottom:8px;}
  p{color:#4a5568; font-size:14px; margin-bottom:24px;}
  input{width:100%; padding:12px 14px; border:1.5px solid #c7cfcf; border-radius:4px; font-family:'Inter'; font-size:14px; margin-bottom:14px;}
  button{width:100%; padding:12px; border-radius:4px; border:none; background:#ff5a36; color:#fff; font-weight:600; font-size:14px; cursor:pointer;}
  button:disabled{opacity:.6; cursor:default;}
  .msg{font-size:13px; margin-top:14px; color:#4a5568;}
  .msg.error{color:#c0392b;}
  .msg.success{color:#1a7a52;}
  a{color:#ff5a36; text-decoration:none; font-weight:600;}
</style>
</head>
<body>
  <div class="card">
    <h1>Log in to Reloop</h1>
    <p>Enter the email you subscribed with. We'll send a magic link — no password needed.</p>
    <form id="login-form">
      <input type="email" id="email" placeholder="you@yourwork.com" required>
      <button type="submit" id="login-btn">Send magic link</button>
    </form>
    <div class="msg" id="status"></div>
    <p style="margin-top:20px;">Not subscribed yet? <a href="/index.html">See plans</a></p>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // Set these once you've created your Supabase project.
    const SUPABASE_URL = 'https://zvyotxqmjrcysajeoujn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2eW90eHFtanJjeXNhamVvdWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMjQzMzAsImV4cCI6MjA5OTgwMDMzMH0.RX48gp9r69qko6IhLut7GAvy5QgWZG0ZTJzb4gC1EW0';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const btn = document.getElementById('login-btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = 'Sending…';

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin + '/dashboard.html' }
      });

      if (error) {
        status.textContent = error.message;
        status.className = 'msg error';
      } else {
        status.textContent = 'Check your inbox — click the link to log in.';
        status.className = 'msg success';
      }
      btn.disabled = false;
      btn.textContent = 'Send magic link';
    });
  </script>
</body>
</html>
