<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're in — Reloop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{
    background:#eaefef; color:#12181f; font-family:'Inter', sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:20px;
  }
  .card{background:#fff; border:1.5px solid #c7cfcf; border-radius:10px; padding:48px; max-width:440px; text-align:center;}
  .tick{width:56px; height:56px; border-radius:50%; background:#3ddc97; color:#fff; font-size:28px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;}
  h1{font-family:'Fraunces', serif; font-size:28px; margin-bottom:12px;}
  p{color:#4a5568; font-size:15px; line-height:1.5;}
  a{color:#ff5a36; font-weight:600; text-decoration:none;}
</style>
</head>
<body>
  <div class="card">
    <div class="tick">✓</div>
    <h1>You're subscribed</h1>
    <p>Your 14-day trial has started. A confirmation is on its way to your inbox — check spam if it doesn't show up in a minute.</p>
    <p style="margin-top:20px;"><a href="/index.html">Back to Reloop</a></p>
  </div>
</body>
</html>
